name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm -r --filter=!@tomehq/landing --filter=!@tomehq/dashboard --filter=!@tomehq/docs build

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Also publish to GitHub Packages ──────────────────
      - name: Publish to GitHub Packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "//npm.pkg.github.com/:_authToken=\${GITHUB_TOKEN}" > .npmrc
          echo "@tomehq:registry=https://npm.pkg.github.com" >> .npmrc
          pnpm -r --filter=!@tomehq/landing --filter=!@tomehq/dashboard --filter=!@tomehq/docs --filter=!create-tome publish --no-git-checks --registry https://npm.pkg.github.com || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Rebuild and deploy docs + dashboard to Vercel ──
      - name: Rebuild and deploy to Vercel
        if: steps.changesets.outputs.published == 'true'
        run: |
          # Build docs
          pnpm --filter @tomehq/docs build

          # Copy docs to landing
          rm -rf packages/landing/public/docs/
          cp -r packages/docs/out/ packages/landing/public/docs/

          # Build dashboard
          pnpm --filter @tomehq/dashboard build

          # Copy dashboard to landing
          rm -rf packages/landing/public/dashboard/
          cp -r packages/dashboard/dist/ packages/landing/public/dashboard/

          # Build landing
          pnpm --filter @tomehq/landing build

          # Deploy to Vercel
          npx vercel --prod --token $VERCEL_TOKEN
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
